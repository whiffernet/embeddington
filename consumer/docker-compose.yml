# Embeddington consumer stack — runs Qdrant + ArangoDB locally to host the shared
# `technology` knowledge graph you import via the consumer CLI.
#
# Licensing: this file only *references* the official upstream images, which Docker
# pulls directly from their publishers — Embeddington never redistributes the engines.
# Qdrant is Apache-2.0; ArangoDB Community is BUSL-1.1 (free for this single-node use).
#
# Image pins: Qdrant is pinned to v1.16.3 to EXACTLY match the version that produced the
# shared snapshot — Qdrant snapshot restore is version-sensitive, so do not float this to
# :latest. ArangoDB dump/restore is patch-tolerant within 3.12.x; 3.12.4 matches the source.
#
# The `embed` service is a local bge-m3 embedding server, built on your machine (so it runs
# on x86_64 AND arm64). It powers vector_search: a search embeds your QUERY with the same
# model the collection was built with. The bge-m3 weights download from Hugging Face on
# first start (cached in the embed_models volume).
#
# Quick start:
#   cp .env.example .env        # then set ARANGO_ROOT_PASSWORD
#   docker compose up -d
#   # ...then run the consumer import-baseline / update commands.
services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + snapshot upload
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

  arango:
    image: arangodb/arangodb:3.12.4
    restart: unless-stopped
    environment:
      # Required — set this in .env (compose fails fast if unset).
      - ARANGO_ROOT_PASSWORD=${ARANGO_ROOT_PASSWORD:?set ARANGO_ROOT_PASSWORD in .env}
    ports:
      - "8529:8529"
    volumes:
      - arango_data:/var/lib/arangodb3

  embed:
    build: ./embed
    restart: unless-stopped
    ports:
      - "8100:8100"   # /embed — bge-m3 query embedding for vector_search
    volumes:
      - embed_models:/root/.cache/huggingface   # cache the model across restarts

volumes:
  qdrant_storage:
  arango_data:
  embed_models:
