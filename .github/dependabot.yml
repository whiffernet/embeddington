version: 2
updates:
- package-ecosystem: pip
  directory: /
  schedule:
    interval: weekly
  open-pull-requests-limit: 5
  labels:
  - dependencies
  groups:
    pip-minor-patch:
      patterns:
      - '*'
      update-types:
      - minor
      - patch
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  labels:
  - dependencies
  groups:
    github-actions:
      patterns:
      - '*'