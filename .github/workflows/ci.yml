name: ci
on:
  pull_request:
  push:
    branches: [main]

# Every job below only checks out code and runs a linter, type-checker, or test suite:
# none reads a secret, calls the API, or writes anything back. Stated explicitly so a
# change to the repository-wide default cannot silently widen the token.
permissions:
  contents: read

# v2 checks: unit (+coverage report), unit-mcp, secret-scan, lint, format, typecheck, semgrep.
# Blocking: all of the above (green locally).
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: pytest --cov=embeddington --cov-report=term-missing -q -m "not integration"

  # Separate job because the MCP server's suite must run with mcp/ as pytest's rootdir --
  # see the comment in mcp/pytest.ini. The root `unit` job never collected these.
  unit-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt
        working-directory: mcp
      - run: pytest -q
        working-directory: mcp

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - name: gitleaks (pinned + checksum-verified)
        run: |
          VER=8.21.2
          SHA=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "${SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --no-banner --redact --exit-code 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3
        with: { args: "format --check" }

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: mypy src/embeddington/

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install semgrep
      - run: semgrep scan --config p/python --config p/secrets --error --metrics off .
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: shellcheck install.sh

  # End-to-end bootstrap proof WITHOUT a docker binary: install.sh must get all the
  # way through clone->venv->pip->wizard, and the wizard must fail with the docker
  # ladder's code (EMB-20, unattended can't consent) — not a crash, not success.
  # This also pins runner.run's rc-127 normalization: with a bare subprocess.run, the
  # missing docker binary would traceback before EMB-20 ever printed.
  installer-smoke:
    runs-on: ubuntu-latest
    container: python:3.12-bookworm
    steps:
      - uses: actions/checkout@v7
      - name: run install.sh unattended against this checkout
        run: |
          set +e
          # safe.directory: the job-container checkout is owned by a different uid,
          # and git refuses "dubious ownership" repos without it. file:// keeps
          # --depth honest (git ignores --depth on plain local-path clones).
          git config --global --add safe.directory '*'
          EMBEDDINGTON_YES=1 \
          EMBEDDINGTON_CLONE_URL="file://$PWD" \
          EMBEDDINGTON_INSTALL_DIR=/tmp/emb-smoke \
          bash install.sh > /tmp/smoke.log 2>&1
          rc=$?
          set -e
          cat /tmp/smoke.log
          test $rc -ne 0 || { echo "expected a nonzero exit without docker"; exit 1; }
          grep -q "EMB-20" /tmp/smoke.log
