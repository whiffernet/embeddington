name: ci
on:
  pull_request:
  push:
    branches: [main]

# Every job below only checks out code and runs a linter, type-checker, or test suite:
# none reads a secret, calls the API, or writes anything back. Stated explicitly so a
# change to the repository-wide default cannot silently widen the token.
permissions:
  contents: read

# v2 checks: unit (+coverage report), unit-mcp, secret-scan, lint, format, typecheck, semgrep.
# Blocking: all of the above (green locally).
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: pytest --cov=embeddington --cov-report=term-missing -q -m "not integration"

  # Separate job because the MCP server's suite must run with mcp/ as pytest's rootdir --
  # see the comment in mcp/pytest.ini. The root `unit` job never collected these.
  unit-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt
        working-directory: mcp
      - run: pytest -q
        working-directory: mcp

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - name: gitleaks (pinned + checksum-verified)
        run: |
          VER=8.21.2
          SHA=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "${SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --no-banner --redact --exit-code 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3
        with: { args: "format --check" }

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: mypy src/embeddington/

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install semgrep
      - run: semgrep scan --config p/python --config p/secrets --error --metrics off .
