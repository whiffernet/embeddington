# Local battery stack for Tier-2 live tests. Pinned to the engine versions
# the public baseline was produced under — snapshot restore is
# version-sensitive; do NOT float to :latest.
services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports: ["19411:6333"]
    volumes: [battery_qdrant:/qdrant/storage]
  arangodb:
    image: arangodb:3.12.4
    ports: ["19412:8529"]
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:?set in env}
    volumes: [battery_arango:/var/lib/arangodb3]
  embed:
    # Same image the consumer stack runs — keeps measurement inside the
    # isolation boundary (spec §4) instead of borrowing a consumer/prod embed.
    build: ../../consumer/embed
    ports: ["18100:8100"]
    volumes: [battery_embed_models:/root/.cache/huggingface]
volumes:
  battery_qdrant:
  battery_arango:
  battery_embed_models:
