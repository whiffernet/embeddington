[pytest]
# This file exists to make mcp/ pytest's rootdir. Without it, pytest walks up to the
# repo-root pyproject.toml, and `pythonpath` (which is rootdir-relative) would put the
# repo root on sys.path -- where this directory, named `mcp/`, shadows the official `mcp`
# SDK that fastmcp imports as `mcp.types`. Symptom: a misleading
# "FastMCP server support is not installed" ImportError at collection.
# Run these tests from inside mcp/, not from the repo root.
pythonpath = .
testpaths = tests
asyncio_mode = strict
